name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore aire.sln
      
    - name: Build
      run: dotnet build aire.sln --no-restore -c Release -m:1 /p:UseSharedCompilation=false
      
    - name: Test
      run: dotnet test .\Aire.Tests\Aire.Tests.csproj --no-build -c Release --verbosity normal
