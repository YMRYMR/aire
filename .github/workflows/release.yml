name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.3). Leave blank to auto-bump the next patch version.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Derive version
      id: version
      shell: pwsh
      run: |
        function Get-VersionValue([string]$value) {
          if ([string]::IsNullOrWhiteSpace($value)) {
            return $null
          }
          $clean = $value.Trim().TrimStart('v', 'V')
          try {
            return [version]$clean
          } catch {
            return $null
          }
        }

        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $manualVersion = "${{ github.event.inputs.version }}".Trim()
          if (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $version = $manualVersion.TrimStart('v', 'V')
          } else {
            [xml]$props = Get-Content -LiteralPath 'Directory.Build.props' -Raw
            $currentVersion = Get-VersionValue $props.Project.PropertyGroup.Version
            $latestTag = git tag --list 'v*' | ForEach-Object { Get-VersionValue $_ } | Where-Object { $_ -ne $null } | Sort-Object -Descending | Select-Object -First 1
            $baseVersion = @($currentVersion, $latestTag) | Where-Object { $_ -ne $null } | Sort-Object -Descending | Select-Object -First 1
            if ($null -eq $baseVersion) {
              $baseVersion = [version]'1.0.0'
            }
            $patch = if ($baseVersion.Build -ge 0) { $baseVersion.Build } else { 0 }
            $version = '{0}.{1}.{2}' -f $baseVersion.Major, $baseVersion.Minor, ($patch + 1)
          }
        } else {
          $version = "${{ github.ref_name }}".TrimStart('v', 'V')
        }
        if ([string]::IsNullOrWhiteSpace($version)) {
          throw "Unable to derive version from trigger."
        }
        if (-not (Get-VersionValue $version)) {
          throw "Version '$version' is invalid. Use a numeric version like 1.2.3."
        }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Create and push tag (workflow_dispatch only)
      if: github.event_name == 'workflow_dispatch'
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        git rev-parse -q --verify "refs/tags/v$version" *> $null
        if ($LASTEXITCODE -eq 0) {
          throw "Version v$version already exists. Leave the version blank to auto-bump or choose a different version."
        }
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v$version"
        git push origin "v$version"

    - name: Restore
      run: dotnet restore aire.sln

    - name: Build release
      run: dotnet build aire.sln -c Release -m:1 -p:Version=${{ steps.version.outputs.version }}

    - name: Package portable app
      id: package
      shell: pwsh
      run: |
        $portableDir = Join-Path $env:GITHUB_WORKSPACE 'Aire\obj\publish\Aire'
        $portableZip = Join-Path $env:RUNNER_TEMP 'Aire.Portable-win-x64.zip'
        if (Test-Path -LiteralPath $portableZip) {
          Remove-Item -LiteralPath $portableZip -Force
        }
        Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath $portableZip -Force
        "portable_zip=$portableZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "setup_exe=$(Join-Path $env:GITHUB_WORKSPACE 'Aire.Setup\obj\publish\Aire.Setup\Aire.Setup.exe')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "msi_path=$(Join-Path $env:GITHUB_WORKSPACE 'Aire.Installer\bin\Release\Aire.msi')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Publish release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        files: |
          ${{ steps.package.outputs.msi_path }}
          ${{ steps.package.outputs.setup_exe }}
          ${{ steps.package.outputs.portable_zip }}
        generate_release_notes: true
